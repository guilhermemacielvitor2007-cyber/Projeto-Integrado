<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640" width="900" height="640" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="640" fill="#f8fafc" rx="8"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="900" height="52" fill="#1e3a5f" rx="8"/>
  <rect x="0" y="44" width="900" height="8" fill="#1e3a5f"/>
  <text x="450" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="white">FLUXO DE ATIVAÇÃO DO BCP/DRP — VitaClínica</text>

  <!-- ===== START OVAL ===== -->
  <ellipse cx="450" cy="95" rx="175" ry="28" fill="#334155" stroke="#1e293b" stroke-width="2"/>
  <text x="450" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="white">ANOMALIA DETECTADA</text>
  <text x="450" y="106" text-anchor="middle" font-size="11" fill="#cbd5e1">Alerta Zabbix · Relato de usuário · Observação direta</text>

  <!-- Arrow 1: start → diamond 1 -->
  <line x1="450" y1="123" x2="450" y2="148" stroke="#475569" stroke-width="2"/>
  <polygon points="450,155 445,145 455,145" fill="#475569"/>

  <!-- ===== DIAMOND 1: Sistema inacessível? ===== -->
  <!-- Diamond center (450, 195), half-w=155, half-h=42 -->
  <polygon points="450,153 605,195 450,237 295,195" fill="#fff7ed" stroke="#d97706" stroke-width="2"/>
  <text x="450" y="189" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">Sistema inacessível</text>
  <text x="450" y="205" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">por mais de 5 minutos?</text>

  <!-- "Não" branch: right from diamond 1 -->
  <line x1="605" y1="195" x2="680" y2="195" stroke="#475569" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="687,195 677,190 677,200" fill="#475569"/>
  <!-- "Não" box -->
  <rect x="692" y="173" width="155" height="44" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" rx="6"/>
  <text x="770" y="191" text-anchor="middle" font-size="11" fill="#475569" font-weight="bold">Monitorar</text>
  <text x="770" y="207" text-anchor="middle" font-size="10" fill="#64748b">Não acionar o BCP</text>
  <!-- "Não" label -->
  <text x="638" y="188" text-anchor="middle" font-size="10" fill="#d97706" font-weight="bold">NÃO</text>

  <!-- "Sim" arrow down from diamond 1 -->
  <line x1="450" y1="237" x2="450" y2="262" stroke="#475569" stroke-width="2"/>
  <polygon points="450,269 445,259 455,259" fill="#475569"/>
  <text x="462" y="258" text-anchor="start" font-size="10" fill="#d97706" font-weight="bold">SIM</text>

  <!-- ===== DIAMOND 2: Tipo de incidente? ===== -->
  <!-- Diamond center (450, 312), half-w=165, half-h=44 -->
  <polygon points="450,268 615,312 450,356 285,312" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="306" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">Identificar tipo</text>
  <text x="450" y="322" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">de incidente</text>

  <!-- Three branches from bottom of diamond 2 (450, 356) -->
  <!-- Horizontal distributor line -->
  <line x1="200" y1="375" x2="700" y2="375" stroke="#475569" stroke-width="1.5"/>
  <line x1="450" y1="356" x2="450" y2="375" stroke="#475569" stroke-width="1.5"/>
  <!-- Left branch -->
  <line x1="200" y1="375" x2="200" y2="395" stroke="#475569" stroke-width="1.5"/>
  <polygon points="200,402 195,392 205,392" fill="#475569"/>
  <!-- Center branch -->
  <line x1="450" y1="375" x2="450" y2="395" stroke="#475569" stroke-width="1.5"/>
  <polygon points="450,402 445,392 455,392" fill="#475569"/>
  <!-- Right branch -->
  <line x1="700" y1="375" x2="700" y2="395" stroke="#475569" stroke-width="1.5"/>
  <polygon points="700,402 695,392 705,392" fill="#475569"/>

  <!-- Branch labels -->
  <text x="200" y="372" text-anchor="middle" font-size="9" fill="#2563eb" font-weight="bold">AM01</text>
  <text x="450" y="372" text-anchor="middle" font-size="9" fill="#dc2626" font-weight="bold">AM02</text>
  <text x="700" y="372" text-anchor="middle" font-size="9" fill="#d97706" font-weight="bold">AM03</text>

  <!-- ===== SCENARIO BOXES ===== -->

  <!-- Box 1: Falha de Hardware (blue) -->
  <rect x="100" y="402" width="200" height="64" fill="#1d4ed8" stroke="#1e40af" stroke-width="2" rx="6"/>
  <text x="200" y="422" text-anchor="middle" font-size="11" font-weight="bold" fill="white">CENÁRIO 1</text>
  <text x="200" y="438" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Falha de Hardware</text>
  <text x="200" y="456" text-anchor="middle" font-size="10" fill="#bfdbfe">RTO: 2 h  |  RPO: 1 h</text>

  <!-- Box 2: Ransomware (red) -->
  <rect x="350" y="402" width="200" height="64" fill="#b91c1c" stroke="#991b1b" stroke-width="2" rx="6"/>
  <text x="450" y="422" text-anchor="middle" font-size="11" font-weight="bold" fill="white">CENÁRIO 2</text>
  <text x="450" y="438" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Ransomware</text>
  <text x="450" y="456" text-anchor="middle" font-size="10" fill="#fecaca">RTO: 8 h  |  RPO: 1 h</text>

  <!-- Box 3: Incêndio (orange) -->
  <rect x="600" y="402" width="200" height="64" fill="#c2410c" stroke="#9a3412" stroke-width="2" rx="6"/>
  <text x="700" y="422" text-anchor="middle" font-size="11" font-weight="bold" fill="white">CENÁRIO 3</text>
  <text x="700" y="438" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Incêndio / Desastre</text>
  <text x="700" y="456" text-anchor="middle" font-size="10" fill="#fed7aa">RTO: 48–72 h  |  RPO: 7 d</text>

  <!-- Arrows down from scenario boxes -->
  <line x1="200" y1="466" x2="200" y2="487" stroke="#475569" stroke-width="1.5"/>
  <polygon points="200,494 195,484 205,484" fill="#475569"/>
  <line x1="450" y1="466" x2="450" y2="487" stroke="#475569" stroke-width="1.5"/>
  <polygon points="450,494 445,484 455,484" fill="#475569"/>
  <line x1="700" y1="466" x2="700" y2="487" stroke="#475569" stroke-width="1.5"/>
  <polygon points="700,494 695,484 705,484" fill="#475569"/>

  <!-- ===== ACTION BOXES ===== -->

  <!-- Action 1 (blue light) -->
  <rect x="100" y="494" width="200" height="72" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5" rx="6"/>
  <text x="200" y="512" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e40af">Acionar Guilherme + Yan</text>
  <text x="200" y="527" text-anchor="middle" font-size="10" fill="#1e3a8a">Restaurar NAS (Cópia 1)</text>
  <text x="200" y="541" text-anchor="middle" font-size="10" fill="#1e3a8a">Alternativa: Amazon S3</text>
  <text x="200" y="557" text-anchor="middle" font-size="9" fill="#3b82f6">Ver Sprint 3, Seção 3.1</text>

  <!-- Action 2 (red light) -->
  <rect x="350" y="494" width="200" height="72" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5" rx="6"/>
  <text x="450" y="512" text-anchor="middle" font-size="10" font-weight="bold" fill="#991b1b">ISOLAR REDE IMEDIATAMENTE</text>
  <text x="450" y="527" text-anchor="middle" font-size="10" fill="#7f1d1d">NUNCA pagar o resgate</text>
  <text x="450" y="541" text-anchor="middle" font-size="10" fill="#7f1d1d">Restaurar Amazon S3</text>
  <text x="450" y="557" text-anchor="middle" font-size="9" fill="#ef4444">Ver Sprint 3, Seção 3.2</text>

  <!-- Action 3 (orange light) -->
  <rect x="600" y="494" width="200" height="72" fill="#ffedd5" stroke="#fdba74" stroke-width="1.5" rx="6"/>
  <text x="700" y="512" text-anchor="middle" font-size="10" font-weight="bold" fill="#9a3412">Evacuar pessoal (prioridade)</text>
  <text x="700" y="527" text-anchor="middle" font-size="10" fill="#7c2d12">Acionar HD off-site (30+ km)</text>
  <text x="700" y="541" text-anchor="middle" font-size="10" fill="#7c2d12">Bombeiros: 193</text>
  <text x="700" y="557" text-anchor="middle" font-size="9" fill="#f97316">Ver Sprint 3, Seção 3.3</text>

  <!-- Convergence lines from action boxes to center -->
  <line x1="200" y1="566" x2="200" y2="595" stroke="#475569" stroke-width="1.5"/>
  <line x1="200" y1="595" x2="450" y2="595" stroke="#475569" stroke-width="1.5"/>
  <line x1="450" y1="566" x2="450" y2="595" stroke="#475569" stroke-width="1.5"/>
  <line x1="700" y1="566" x2="700" y2="595" stroke="#475569" stroke-width="1.5"/>
  <line x1="700" y1="595" x2="450" y2="595" stroke="#475569" stroke-width="1.5"/>
  <!-- Final arrow down -->
  <line x1="450" y1="595" x2="450" y2="608" stroke="#475569" stroke-width="2"/>
  <polygon points="450,615 445,605 455,605" fill="#475569"/>

  <!-- ===== END OVAL ===== -->
  <ellipse cx="450" cy="630" rx="210" ry="22" fill="#166534" stroke="#14532d" stroke-width="2"/>
  <text x="450" y="625" text-anchor="middle" font-size="12" font-weight="bold" fill="white">REGISTRAR INCIDENTE</text>
  <text x="450" y="639" text-anchor="middle" font-size="11" fill="#bbf7d0">Preencher formulário + Comunicar + Retomar operações</text>

  <!-- ===== LEGEND ===== -->
  <rect x="12" y="540" width="72" height="85" fill="white" stroke="#cbd5e1" stroke-width="1" rx="4"/>
  <text x="48" y="555" text-anchor="middle" font-size="9" font-weight="bold" fill="#334155">LEGENDA</text>
  <!-- Decision -->
  <polygon points="48,566 60,572 48,578 36,572" fill="#fff7ed" stroke="#d97706" stroke-width="1"/>
  <text x="64" y="576" font-size="8" fill="#475569">Decisão</text>
  <!-- Process -->
  <rect x="35" y="582" width="26" height="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1" rx="2"/>
  <text x="64" y="591" font-size="8" fill="#475569">Ação</text>
  <!-- Start/End -->
  <ellipse cx="48" cy="607" rx="14" ry="7" fill="#334155" stroke="#1e293b" stroke-width="1"/>
  <text x="64" y="611" font-size="8" fill="#475569">Início/Fim</text>

</svg>
